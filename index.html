<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VYBZ — TikTok & Meme Soundboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS ─────────────────────────────────── */
:root{
  --bg:#070710;
  --surface:#0f0f1c;
  --card:#13131f;
  --border:#1c1c30;
  --pink:#ff2d78;
  --cyan:#00e5ff;
  --purple:#b44bff;
  --yellow:#ffe030;
  --orange:#ff6b00;
  --green:#00ff88;
  --white:#eeeeff;
  --muted:#4a4a6a;
  --font-h:'Bebas Neue',sans-serif;
  --font-b:'Space Grotesk',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--white);
  font-family:var(--font-b);
  min-height:100vh;
  overflow-x:hidden;
}

/* animated noise grain overlay */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.35;
}

/* gradient mesh background blobs */
.blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;animation:drift 12s ease-in-out infinite alternate;}
.blob1{width:600px;height:600px;background:rgba(255,45,120,.06);top:-200px;left:-200px;animation-delay:0s}
.blob2{width:500px;height:500px;background:rgba(180,75,255,.07);bottom:-150px;right:-150px;animation-delay:-4s}
.blob3{width:400px;height:400px;background:rgba(0,229,255,.05);top:40%;left:50%;animation-delay:-8s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,30px) scale(1.08)}}

/* ── STICKY HEADER ──────────────────────────── */
header{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:14px;
  padding:16px 32px;
  background:rgba(7,7,16,.82);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.logo{
  width:44px;height:44px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,var(--pink) 0%,var(--purple) 100%);
  display:grid;place-items:center;
  font-family:var(--font-h);font-size:1.4rem;color:#fff;
  box-shadow:0 0 24px rgba(255,45,120,.5);
}
.brand h1{font-family:var(--font-h);font-size:2rem;letter-spacing:4px;
  background:linear-gradient(90deg,var(--pink),var(--cyan) 60%,var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand p{font-size:.62rem;color:var(--muted);letter-spacing:1.5px;margin-top:1px;text-transform:uppercase}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.badge{
  display:flex;align-items:center;gap:6px;
  border:1px solid rgba(255,45,120,.3);
  background:rgba(255,45,120,.08);
  border-radius:20px;padding:4px 12px;
  font-size:.6rem;letter-spacing:1px;color:var(--pink);text-transform:uppercase;
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);animation:pulse 1.3s ease infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--pink)}50%{opacity:.3;box-shadow:none}}

/* ── CONTROLS BAR ───────────────────────────── */
.controls{
  position:relative;z-index:10;
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  padding:12px 32px;
  background:rgba(7,7,16,.6);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.ctrl{display:flex;align-items:center;gap:8px;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
input[type=range]{
  -webkit-appearance:none;width:90px;height:3px;
  background:var(--border);border-radius:2px;outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;cursor:pointer;
  background:var(--cyan);box-shadow:0 0 8px var(--cyan);
}
.ctrl-val{min-width:30px;color:var(--cyan);font-variant-numeric:tabular-nums;font-size:.62rem}

/* category tabs */
.tabs{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap}
.tab{
  font-family:var(--font-b);font-size:.62rem;letter-spacing:.5px;
  padding:5px 14px;border-radius:20px;cursor:pointer;
  background:transparent;border:1px solid var(--border);color:var(--muted);
  transition:all .18s;
}
.tab:hover,.tab.on{
  background:rgba(255,45,120,.1);border-color:var(--pink);
  color:var(--pink);box-shadow:0 0 12px rgba(255,45,120,.12);
}

/* ── MAIN GRID ──────────────────────────────── */
main{position:relative;z-index:2;padding:28px 32px 140px}

.section{margin-bottom:40px}
.sec-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;
  font-family:var(--font-h);font-size:1.4rem;letter-spacing:2px;
}
.sec-pill{
  font-family:var(--font-b);font-size:.55rem;letter-spacing:1.5px;
  border:1px solid currentColor;border-radius:20px;
  padding:3px 9px;text-transform:uppercase;opacity:.8;
}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:10px;
}

/* ── SOUND CARD ─────────────────────────────── */
.card{
  position:relative;overflow:hidden;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px 14px 16px;
  cursor:pointer;text-align:left;
  font-family:var(--font-b);
  transition:transform .12s,box-shadow .15s,border-color .15s;
  user-select:none;-webkit-user-select:none;
}
/* colour accent via CSS var --c per card */
.card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:radial-gradient(ellipse 90% 60% at 50% -10%,color-mix(in srgb,var(--c,#ff2d78) 22%,transparent),transparent);
  opacity:0;transition:opacity .25s;
}
.card:hover::before,.card.on::before{opacity:1}
.card:hover{transform:translateY(-3px);border-color:var(--c,#ff2d78);box-shadow:0 8px 28px color-mix(in srgb,var(--c,#ff2d78) 18%,transparent)}
.card.on{border-color:var(--c,#ff2d78);box-shadow:0 0 32px color-mix(in srgb,var(--c,#ff2d78) 28%,transparent);transform:scale(.97)}
.card:active{transform:scale(.94)}

/* color helpers */
.pink  {--c:var(--pink)}
.cyan  {--c:var(--cyan)}
.purple{--c:var(--purple)}
.yellow{--c:var(--yellow)}
.orange{--c:var(--orange)}
.green {--c:var(--green)}

.key-tag{
  position:absolute;top:8px;right:9px;
  font-size:.5rem;color:var(--muted);
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:4px;padding:2px 5px;font-family:'Space Grotesk',monospace;
}
.card-icon{font-size:1.7rem;display:block;margin-bottom:10px;line-height:1}
.card-name{font-size:.72rem;font-weight:700;color:var(--white);display:block;margin-bottom:3px;line-height:1.25}
.card-sub{font-size:.57rem;color:var(--muted);display:block;line-height:1.4}

/* progress bar */
.prog{
  position:absolute;bottom:0;left:0;height:2px;width:0;
  background:var(--c,#ff2d78);border-radius:0 0 16px 16px;
}

/* ripple */
.rip{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.1);
  transform:scale(0);pointer-events:none;
  animation:ripout .55s ease-out forwards;
}
@keyframes ripout{to{transform:scale(5);opacity:0}}

/* ── NOW PLAYING ────────────────────────────── */
#np{
  position:fixed;bottom:66px;left:32px;right:32px;z-index:200;
  display:flex;align-items:center;gap:10px;
  background:rgba(13,13,25,.92);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:14px;
  padding:10px 18px;font-size:.68rem;
  opacity:0;transform:translateY(12px);
  transition:opacity .3s,transform .3s;pointer-events:none;
}
#np.show{opacity:1;transform:translateY(0)}
.np-dot{width:8px;height:8px;border-radius:50%;background:var(--pink);flex-shrink:0;animation:pulse 1s infinite}
#np-text{color:var(--white);font-weight:600;font-size:.7rem}

/* ── VISUALIZER ─────────────────────────────── */
#viz{
  position:fixed;bottom:0;left:0;right:0;z-index:190;
  height:62px;display:flex;align-items:flex-end;gap:2px;
  padding:0 32px;
  background:linear-gradient(transparent,rgba(7,7,16,.98));
  pointer-events:none;
}
.vbar{
  flex:1;border-radius:2px 2px 0 0;
  min-height:2px;
  transition:height .07s ease;
}

/* ── SPEECH STATUS ──────────────────────────── */
#speech-banner{
  display:none;
  position:fixed;top:80px;right:20px;z-index:300;
  background:rgba(255,45,120,.15);border:1px solid rgba(255,45,120,.3);
  border-radius:10px;padding:8px 14px;font-size:.62rem;color:var(--pink);
  letter-spacing:1px;text-transform:uppercase;
}
#speech-banner.show{display:block}

/* ── RESPONSIVE ─────────────────────────────── */
@media(max-width:600px){
  header{padding:12px 16px}
  .controls{padding:10px 16px;gap:12px}
  main{padding:20px 16px 140px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
  #viz{padding:0 16px}
  #np{left:16px;right:16px}
}
</style>
</head>
<body>

<!-- background blobs -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div id="speech-banner">🎤 Speaking…</div>

<header>
  <div class="logo">V</div>
  <div class="brand">
    <h1>VYBZ</h1>
    <p>TikTok &amp; Meme Soundboard · Web Audio + Speech · v3.0</p>
  </div>
  <div class="header-right">
    <div class="badge"><span class="badge-dot"></span>Live</div>
  </div>
</header>

<div class="controls">
  <div class="ctrl">
    VOL <input type="range" id="vol" min="0" max="1" step=".01" value=".8"/>
    <span class="ctrl-val" id="volV">80%</span>
  </div>
  <div class="ctrl">
    REVERB <input type="range" id="rvb" min="0" max="1" step=".01" value=".2"/>
    <span class="ctrl-val" id="rvbV">20%</span>
  </div>
  <div class="ctrl">
    PITCH <input type="range" id="ptch" min=".5" max="2" step=".05" value="1"/>
    <span class="ctrl-val" id="ptchV">1.0×</span>
  </div>
  <div class="ctrl">
    RATE <input type="range" id="sprate" min=".5" max="1.8" step=".05" value="1"/>
    <span class="ctrl-val" id="sprateV">1.0×</span>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab on" data-cat="all">All</button>
    <button class="tab" data-cat="tiktok">🎵 TikTok</button>
    <button class="tab" data-cat="meme">😂 Memes</button>
    <button class="tab" data-cat="sfx">⚡ SFX</button>
  </div>
</div>

<main id="main"></main>

<div id="np"><span class="np-dot"></span><span>NOW PLAYING &nbsp;</span><span id="np-text">—</span></div>
<div id="viz"></div>

<script>
/* ═══════════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════════ */
let ctx, master, dryG, wetG, conv, analyser;
let VOL=.8, RVB=.2, PITCH=1, SPRATE=1;

function bootAudio(){
  if(ctx) return;
  ctx = new (window.AudioContext||window.webkitAudioContext)();
  master  = ctx.createGain(); master.gain.value = VOL;
  dryG    = ctx.createGain(); dryG.gain.value   = 1-RVB;
  wetG    = ctx.createGain(); wetG.gain.value   = RVB;
  analyser= ctx.createAnalyser(); analyser.fftSize = 256;
  conv    = ctx.createConvolver(); conv.buffer = mkIR(ctx,2,.5);
  master.connect(dryG); dryG.connect(analyser);
  master.connect(wetG); wetG.connect(conv); conv.connect(analyser);
  analyser.connect(ctx.destination);
}
function mkIR(c,dur,dec){
  const s=c.sampleRate,n=s*dur,b=c.createBuffer(2,n,s);
  for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,dec);}
  return b;
}
function osc(type,freq){
  const o=ctx.createOscillator(); o.type=type; o.frequency.value=freq*PITCH; return o;
}
function gain(val=1){const g=ctx.createGain();g.gain.value=val;return g;}
function env(g,vol,atk,hold,rel,t){
  g.gain.cancelScheduledValues(t);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+atk);
  g.gain.setValueAtTime(vol,t+atk+hold);
  g.gain.exponentialRampToValueAtTime(.0001,t+atk+hold+rel);
}
function noiseBuf(dur){
  const n=Math.ceil(ctx.sampleRate*dur),b=ctx.createBuffer(1,n,ctx.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
  const s=ctx.createBufferSource(); s.buffer=b; return s;
}
function bpf(freq,q=1){const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=freq;f.Q.value=q;return f;}
function lpf(freq){const f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=freq;return f;}
function hpf(freq){const f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=freq;return f;}
function chain(...nodes){ for(let i=0;i<nodes.length-1;i++) nodes[i].connect(nodes[i+1]); }

/* ═══════════════════════════════════════════════
   WEB SPEECH API
═══════════════════════════════════════════════ */
const synth = window.speechSynthesis;
let voices = [];
function loadVoices(){
  voices = synth.getVoices();
  // prefer a US English voice
  if(!voices.length) setTimeout(loadVoices,200);
}
loadVoices();
if(synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function speak(text, opts={}){
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  // pick best voice
  const picked = voices.find(v=>v.lang==='en-US'&&v.name.toLowerCase().includes('google'))
    || voices.find(v=>v.lang==='en-US')
    || voices.find(v=>v.lang.startsWith('en'))
    || voices[0];
  if(picked) utt.voice = picked;
  utt.rate   = (opts.rate   || 1) * SPRATE;
  utt.pitch  = opts.pitch  || 1;
  utt.volume = VOL;
  const banner = document.getElementById('speech-banner');
  banner.classList.add('show');
  utt.onend = () => banner.classList.remove('show');
  utt.onerror = () => banner.classList.remove('show');
  synth.speak(utt);
  return (text.length / 12) * (1/utt.rate) * 1000 + 400;
}

/* helper: play a musical bed then speak over it */
function bedSpeak(text, bedFn, opts={}){
  bootAudio();
  if(ctx.state==='suspended') ctx.resume();
  bedFn(ctx.currentTime);
  return speak(text, opts);
}

/* ═══════════════════════════════════════════════
   SOUND DEFINITIONS
═══════════════════════════════════════════════ */
const SOUNDS = [

  /* ──────────────────────────────────────────
     TIKTOK SONGS — Speech sings the hook,
     synth plays the musical bed underneath
  ────────────────────────────────────────── */
  {
    id:'espresso', name:'Espresso', sub:'Sabrina Carpenter · 2024',
    icon:'☕', color:'pink', cat:'tiktok', key:'Q',
    fn(){
      return bedSpeak(
        "That's that me espresso",
        t=>{
          // bouncy pop synth bed E-G#-B
          [[330,0],[415,.2],[494,.4],[415,.6],[330,.8],[494,1.0]].forEach(([f,dt])=>{
            const o=osc('triangle',f), g=gain(); chain(o,g,master);
            env(g,.28,.01,.05,.18,t+dt); o.start(t+dt); o.stop(t+dt+.28);
          });
          // bass
          [0,.4,.8].forEach(dt=>{ const b=osc('sine',82),bg=gain(); chain(b,bg,master); env(bg,.4,.01,.08,.2,t+dt); b.start(t+dt); b.stop(t+dt+.32); });
        },
        {rate:.92, pitch:1.15}
      );
    }
  },

  {
    id:'birds', name:'Birds of a Feather', sub:'Billie Eilish · 2024',
    icon:'🐦', color:'cyan', cat:'tiktok', key:'W',
    fn(){
      return bedSpeak(
        "I wanna be by your side, birds of a feather, we flock together",
        t=>{
          // dreamy slow arpeggio Dmaj: D-F#-A
          [[293,0],[370,.35],[440,.7],[587,1.05],[440,1.4],[370,1.75]].forEach(([f,dt])=>{
            const o=osc('sine',f), g=gain(); chain(o,g,master);
            env(g,.22,.08,.3,.45,t+dt); o.start(t+dt); o.stop(t+dt+.9);
          });
        },
        {rate:.8, pitch:1.0}
      );
    }
  },

  {
    id:'pretty_baby', name:'Pretty Little Baby', sub:'Connie Francis · TikTok #1',
    icon:'🌸', color:'yellow', cat:'tiktok', key:'E',
    fn(){
      return bedSpeak(
        "Pretty little baby, pretty little baby, pretty little baby of mine",
        t=>{
          // retro doo-wop: C-E-G
          [[523,0],[659,.22],[784,.44],[659,.66],[523,.88],[659,1.1],[784,1.32]].forEach(([f,dt])=>{
            const o=osc('triangle',f), g=gain(); chain(o,g,master);
            env(g,.25,.01,.08,.2,t+dt); o.start(t+dt); o.stop(t+dt+.32);
          });
        },
        {rate:.88, pitch:1.1}
      );
    }
  },

  {
    id:'not_like_us', name:'Not Like Us', sub:'Kendrick Lamar · 2024',
    icon:'🦅', color:'orange', cat:'tiktok', key:'R',
    fn(){
      return bedSpeak(
        "They not like us, they not like us, they not like us",
        t=>{
          // trap kick pattern
          for(let i=0;i<8;i++){
            const even=i%2===0;
            if(even){
              const k=osc('sine',60); k.frequency.exponentialRampToValueAtTime(28*PITCH,t+i*.2+.08);
              const kg=gain(); chain(k,kg,master); env(kg,.8,.002,.01,.18,t+i*.2); k.start(t+i*.2); k.stop(t+i*.2+.22);
            }
            // hi-hat every step
            const n=noiseBuf(.04), nf=hpf(8000), ng=gain();
            chain(n,nf,ng,master);
            env(ng,.18,.001,.005,.035,t+i*.2+.01);
            n.start(t+i*.2+.01); n.stop(t+i*.2+.06);
          }
        },
        {rate:.78, pitch:.85}
      );
    }
  },

  {
    id:'anxiety', name:'Anxiety', sub:'Doechii · 51.6B TikTok views',
    icon:'😰', color:'green', cat:'tiktok', key:'T',
    fn(){
      return bedSpeak(
        "Anxiety, anxiety, got me feeling like I'm going crazy",
        t=>{
          // stuttery syncopated hits
          [0,.1,.2,.35,.45,.6].forEach((dt,i)=>{
            const f=[300,400,250,350,500,200][i];
            const o=osc('square',f), flt=bpf(600,6), g=gain(); chain(o,flt,g,master);
            env(g,.3,.005,.01,.07,t+dt); o.start(t+dt); o.stop(t+dt+.1);
          });
          const drop=osc('sawtooth',55), dg=gain(); chain(drop,dg,master);
          env(dg,.5,.01,.15,.4,t+.7); drop.start(t+.7); drop.stop(t+1.35);
        },
        {rate:.9, pitch:1.05}
      );
    }
  },

  {
    id:'million_baby', name:'Million Dollar Baby', sub:'Tommy Richman · 2024',
    icon:'💰', color:'purple', cat:'tiktok', key:'Y',
    fn(){
      return bedSpeak(
        "I'm a million dollar baby, yeah",
        t=>{
          // funky falsetto groove
          [[880,0],[1047,.12],[880,.24],[784,.36],[880,.48]].forEach(([f,dt])=>{
            const o=osc('triangle',f),g=gain(); chain(o,g,master);
            env(g,.28,.005,.01,.15,t+dt); o.start(t+dt); o.stop(t+dt+.18);
          });
          // bass groove
          [0,.25,.375,.5,.625].forEach(dt=>{
            const b=osc('sawtooth',110), lp=lpf(400), bg=gain(); chain(b,lp,bg,master);
            env(bg,.4,.01,.04,.12,t+dt); b.start(t+dt); b.stop(t+dt+.16);
          });
        },
        {rate:.85, pitch:1.2}
      );
    }
  },

  {
    id:'copacabana', name:'Copacabana', sub:'Barry Manilow · TikTok revival',
    icon:'🪩', color:'yellow', cat:'tiktok', key:'A',
    fn(){
      return bedSpeak(
        "Her name was Lola, she was a showgirl, at the Copa, Copacabana",
        t=>{
          // Latin brass fanfare: F Bb C F
          [[349,0],[466,.2],[523,.4],[698,.6],[523,.9],[466,1.1],[698,1.4]].forEach(([f,dt])=>{
            const o=osc('sawtooth',f), lp=lpf(1800), g=gain(); chain(o,lp,g,master);
            env(g,.28,.01,.08,.18,t+dt); o.start(t+dt); o.stop(t+dt+.28);
          });
          // congas (noise hits)
          [0,.25,.375,.5,.75,1,.125].forEach(dt=>{
            const n=noiseBuf(.06), bp=bpf(300,5), ng=gain(); chain(n,bp,ng,master);
            env(ng,.22,.001,.01,.05,t+dt); n.start(t+dt); n.stop(t+dt+.07);
          });
        },
        {rate:.82, pitch:.95}

/* ═══════════════════════════════════════════════
   RENDER UI
═══════════════════════════════════════════════ */
const CATS = {
  tiktok:{label:'🎵 TikTok Songs', pill:'VIRAL HOOKS', color:'var(--pink)'},
  meme:  {label:'😂 Meme Sounds',  pill:'INTERNET CLASSICS', color:'var(--yellow)'},
  sfx:   {label:'⚡ Sound FX',     pill:'EFFECTS', color:'var(--cyan)'},
};

function render(filter){
  const main = document.getElementById('main');
  main.innerHTML='';
  Object.keys(CATS).forEach(cat=>{
    if(filter!=='all' && cat!==filter) return;
    const sounds = SOUNDS.filter(s=>s.cat===cat);
    if(!sounds.length) return;
    const C = CATS[cat];
    const sec = document.createElement('div'); sec.className='section';
    sec.innerHTML=`<div class="sec-head" style="color:${C.color}">
      ${C.label}
      <span class="sec-pill" style="border-color:${C.color};color:${C.color}">${C.pill}</span>
      <span class="sec-line"></span>
    </div>`;
    const grid=document.createElement('div'); grid.className='grid';
    sounds.forEach(s=>grid.appendChild(mkCard(s)));
    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

function mkCard(s){
  const el=document.createElement('button');
  el.className=`card ${s.color}`;
  el.dataset.id=s.id;
  el.innerHTML=`
    ${s.key?`<span class="key-tag">${s.key}</span>`:''}
    <span class="card-icon">${s.icon}</span>
    <span class="card-name">${s.name}</span>
    <span class="card-sub">${s.sub}</span>
    <div class="prog" id="pg-${s.id}"></div>
  `;
  el.addEventListener('pointerdown', e=>{ addRipple(e,el); triggerSound(s,el); });
  return el;
}

function addRipple(e,el){
  const r=document.createElement('span'); r.className='rip';
  const rect=el.getBoundingClientRect(), sz=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  el.appendChild(r); setTimeout(()=>r.remove(),600);
}

const timers={};
function triggerSound(s,card){
  // cancel any existing speech
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  bootAudio(); if(ctx.state==='suspended') ctx.resume();

  const dur = s.fn();

  card.classList.add('on');
  const pg=document.getElementById(`pg-${s.id}`);
  if(pg){ pg.style.transition='none'; pg.style.width='0';
    requestAnimationFrame(()=>{ pg.style.transition=`width ${dur}ms linear`; pg.style.width='100%'; }); }

  clearTimeout(timers[s.id]);
  timers[s.id]=setTimeout(()=>{
    card.classList.remove('on');
    if(pg){ pg.style.transition='none'; pg.style.width='0'; }
  }, dur);

  // now playing
  const npEl=document.getElementById('np'), npTxt=document.getElementById('np-text');
  npTxt.textContent=`${s.icon}  ${s.name.toUpperCase()} — ${s.sub}`;
  npEl.classList.add('show');
  clearTimeout(npEl._t);
  npEl._t=setTimeout(()=>npEl.classList.remove('show'), dur+600);
}

document.getElementById('vol').addEventListener('input',function(){
  VOL=+this.value; document.getElementById('volV').textContent=Math.round(VOL*100)+'%';
  if(master) master.gain.value=VOL;
});
document.getElementById('rvb').addEventListener('input',function(){
  RVB=+this.value; document.getElementById('rvbV').textContent=Math.round(RVB*100)+'%';
  if(wetG){ wetG.gain.value=RVB; dryG.gain.value=1-RVB; }
});
document.getElementById('ptch').addEventListener('input',function(){
  PITCH=+this.value; document.getElementById('ptchV').textContent=PITCH.toFixed(2)+'×';
});
document.getElementById('sprate').addEventListener('input',function(){
  SPRATE=+this.value; document.getElementById('sprateV').textContent=SPRATE.toFixed(2)+'×';
});

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    tab.classList.add('on');
    render(tab.dataset.cat);
  });
});

/* ═══════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════ */
const keyMap={};
SOUNDS.forEach(s=>{ if(s.key) keyMap[s.key.toUpperCase()]=s; });
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  const s=keyMap[e.key.toUpperCase()]; if(!s) return;
  const card=document.querySelector(`[data-id="${s.id}"]`);
  if(card) triggerSound(s,card);
});

/* ═══════════════════════════════════════════════
   VISUALIZER
═══════════════════════════════════════════════ */
const vizEl=document.getElementById('viz');
const BARS=64;
const barColors=['#ff2d78','#ff6b00','#ffe030','#00ff88','#00e5ff','#b44bff'];
const vbars=[];
for(let i=0;i<BARS;i++){
  const b=document.createElement('div'); b.className='vbar';
  b.style.background=barColors[Math.floor(i/(BARS/barColors.length))%barColors.length];
  vizEl.appendChild(b); vbars.push(b);
}
(function loop(){
  requestAnimationFrame(loop);
  if(!analyser) return;
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  vbars.forEach((b,i)=>{
    const v=data[Math.floor(i*data.length/BARS)];
    const h=Math.max(2,(v/255)*56);
    b.style.height=h+'px';
    b.style.opacity=.4+(h/80);
  });
})();
